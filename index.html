/* в”Ђв”Ђ Helpers в”Ђв”Ђ */
function el(tag, cls) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  return e;
}
function createBlock() {
  const d = el('div','block');
  terminal.appendChild(d);
  return d;
}
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
function scrollEnd() { window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' }); }

async function typeInto(node, text, delay) {
  for (let i = 0; i < text.length; i++) {
    node.textContent += text[i];
    if (i % 4 === 0) scrollEnd();
    if (delay > 0) await sleep(delay);
  }
}

/* в”Ђв”Ђ Renderers в”Ђв”Ђ */

/* Only commands get typed char-by-char. All output appears instantly. */
async function renderCommand(s) {
  const b = createBlock(); b.classList.add('visible');
  b.innerHTML = buildPrompt();
  const c = el('span','cmd'); b.appendChild(c);
  await typeInto(c, s.cmd, s.delay);
  await sleep(120);
}

async function run() {
  for (const s of sections) {
    switch(s.type) {
      case 'command':    await renderCommand(s); break;
      case 'ascii':      await renderAscii(s); break;
      case 'raw':        await renderRaw(s); break;
      case 'sep':        await renderSep(); break;
      case 'about':      await renderAbout(s); break;
      case 'skillblock': await renderSkillBlock(s); break;
      case 'textblock':  await renderTextBlock(s); break;
      case 'contact':    await renderContact(s); break;
      case 'socials':    await renderSocials(s); break;
      case 'final':      await renderFinal(); break;
    }
  }
  setTimeout(showHackPopup, 3000);
}

(function() {
  const key = 'sb_last_login';
  const prev = localStorage.getItem(key);
  const now = new Date().toString().replace(/\s*\(.*\)$/, '');
  const display = prev ? 'Last login: ' + prev : 'Last login: first session';
  localStorage.setItem(key, now);
  const idx = bootLines.findIndex(l => l.text === '__LASTLOGIN__');
  if (idx !== -1) bootLines[idx].text = display;
})();

function bootLine(html) {
  const d = document.createElement('div');
  d.className = 'boot-line';
  d.innerHTML = html;
  bootScreen.appendChild(d);
  bootScreen.scrollTop = bootScreen.scrollHeight;
}

async function runBoot() {
  for (const l of bootLines) {
    if (l.text === '') { bootLine('&nbsp;'); }
    else if (l.tag === 'ok') {
      const parts = l.text.split('вњ“');
      if (parts.length === 2) {
        bootLine(`<span class="${l.cls}">${parts[0]}</span><span class="boot-ok">вњ“</span>`);
      } else if (l.text.startsWith('[ OK ]')) {
        bootLine(`<span class="boot-ok">[ OK ]</span><span class="${l.cls || ''}">${l.text.slice(6)}</span>`);
      } else {
        const idx = l.text.lastIndexOf('вЂ”');
        if (idx > -1) {
          bootLine(`<span class="${l.cls}">${l.text.slice(0, idx + 1)}</span> <span class="boot-ok">${l.text.slice(idx + 2)}</span>`);
        } else {
          bootLine(`<span class="${l.cls}">${l.text}</span> <span class="boot-ok">OK</span>`);
        }
      }
    } else {
      bootLine(`<span class="${l.cls}">${l.text}</span>`);
    }
    await sleep(l.d);
  }

  await sleep(300);
  bootScreen.classList.add('fade-out');
  await sleep(400);
  bootScreen.style.display = 'none';
  topBar.style.display = '';
  terminal.style.display = '';
  statusBar.style.display = '';
  run();
}
