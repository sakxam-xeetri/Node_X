; ============================================================================
; NodeX — ESP32 Wi-Fi Repeater  |  PlatformIO Configuration
; ============================================================================
[env:nodex]
platform  = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.13/platform-espressif32.zip
board     = esp32dev
framework = arduino

; ----- Build flags -----
build_flags =
    -DCORE_DEBUG_LEVEL=1
    -DCONFIG_LWIP_IP_FORWARD=1
    -DCONFIG_LWIP_IPV4_NAPT=1
    -DARDUINO_RUNNING_CORE=1
    -DARDUINO_EVENT_RUNNING_CORE=0

; ----- Serial / upload -----
monitor_speed  = 115200
upload_speed   = 921600
upload_port    = COM7          ; ESP32 DevKit V1 (CP210x)

; ----- OTA upload (uncomment when using OTA) -----
; upload_protocol = espota
; upload_port     = 192.168.4.1
; upload_flags    = --auth=nodex_ota

; ----- Partition table — OTA-capable with SPIFFS -----
board_build.partitions = min_spiffs.csv

; ----- Library dependencies -----
lib_deps =
    bblanchon/ArduinoJson@^7.0.0
    mathieucarbou/ESPAsyncWebServer@^3.6.0
    mathieucarbou/AsyncTCP@^3.3.2

; ----- Monitor filters -----
monitor_filters = esp32_exception_decoder
